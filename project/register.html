<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registeration · Murmur</title>
    <link rel="stylesheet" href="/project/css/styles.css">
</head>
<body>
    <header class="app-header">
    <nav class="app-nav">
        <a href="feed.html" class="logo">Murmur</a>
        <div class="nav-actions">
            <a href="login.html">Log in</a>
            <a href="register.html" class="active-nav">Register</a>
        </div>
    </nav>
</header>

    <main>
        <section class="s-container">
            <h1>Create Your Account</h1>
            <form id="register-f">
                <div class="form-g">
                    <label for="username">UserName</label>
                    <input type="text" id="username" name="username" placeholder="enter your user name" required>

                </div>
                <div class="form-g">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"  placeholder="enter your email" required>
                </div>
                <div class="form-g">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"  placeholder="enter your password" required>
                    <small class="h">It should Include numbers and letters</small>
                </div>
                <div class="form-g">
                    <label for="profile">Profile Picture(optional)</label>
                    <input type="file" id="profile" name="profile" accept="image/*">
                    
                </div>
                <button type="submit" class="btn-primary">Register</button>
                
            </form>

                <p class="acc">Already have an acoount?<a href="login.html">Log in</a></p>

        </section>
    </main>
    
</body>
</html>
