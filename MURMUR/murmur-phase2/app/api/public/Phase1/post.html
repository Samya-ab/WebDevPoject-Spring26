<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post · Murmur</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="app-header">
        <nav class="app-nav">
            <a href="feed.html" class="logo">Murmur</a>
            <div class="search-box">
                <input type="search" class="search-input" id="search-input" placeholder="Search users..."
                    autocomplete="off">
                <ul id="search-results" class="search-results" hidden></ul>
            </div>
            <div class="nav-actions">
                <a href="profile.html" id="nav-profile-link">
                    Profile
                    <span id="nav-avatar" class="avatar avatar-sm"></span>
                </a>
                <button id="logout-btn">Log out</button>
            </div>
        </nav>
    </header>

    <div class="feed-layout">
        <!-- Left Sidebar -->
        <aside class="sidebar-left">
            <div class="sidebar-profile-card">
                <span id="sidebar-avatar" class="avatar avatar-md"></span>
                <div class="sidebar-user-info">
                    <strong id="sidebar-username"></strong>
                    <span id="sidebar-handle" class="handle"></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="feed.html" class="sidebar-link">🏠 Home</a>
                <a href="profile.html" class="sidebar-link">👤 Profile</a>
            </nav>
        </aside>

        <!-- Main Post -->
        <main class="main-content">
            <div class="back-link">
                <a href="feed.html">← Back to Feed</a>
            </div>

            <article class="post-card">
                <header class="post-header">
                    <div id="post-author-avatar" class="avatar avatar-md"></div>
                    <div>
                        <h2 id="post-author-name"></h2>
                        <div class="post-meta">
                            <span id="post-author-username"></span> · <span id="post-timestamp"></span>
                        </div>
                    </div>
                </header>

                <p id="post-content" class="post-content"></p>
                <img id="post-image" style="display: none; max-width: 100%; border-radius: 12px; margin: 15px 0;">


                <div class="post-stats">
                    <span id="likes-count">❤️ 0 likes</span>
                    <span id="comments-count">💬 0 comments</span>
                </div>

                <button id="like-btn" class="like-btn">❤️ Like</button>

                <section class="comments">
                    <h3>Comments <span id="comment-count">(0)</span></h3>

                    <div class="comment-form">
                        <div id="comment-avatar" class="avatar avatar-sm"></div>
                        <input type="text" id="comment-input" placeholder="Add a comment...">
                        <button id="submit-comment">Post</button>
                    </div>

                    <div id="comments-list"></div>
                </section>
            </article>
        </main>
    </div>
    <div id="confirm-modal" class="confirm-overlay">
        <div class="confirm-box">
            <h3 id="confirm-title">Confirm action</h3>
            <p id="confirm-message">Are you sure?</p>
            <div class="confirm-actions">
                <button id="confirm-cancel" class="btn btn-secondary" type="button">Cancel</button>
                <button id="confirm-ok" class="btn btn-primary" type="button">Delete</button>
            </div>
        </div>
    </div>

    <script src="javascript/post.js"></script>
</body>

</html>
